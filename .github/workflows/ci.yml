name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  CERTIFYEDGE_SOURCE_COMMIT: ${{ github.sha }}

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo clippy (PCS v0.1)
        run: cargo clippy -p labtrust-adapter -p pcs-certificate -p certifyedge -- -D warnings

      - name: Validate property profiles
        run: bash ./scripts/validate-profiles.sh

      - name: Certificate benchmark suites (all profiles)
        run: make benchmark-certificates

      - name: cargo test (PCS v0.1)
        run: cargo test -p certifyedge-integration -- --test-threads=4 --nocapture

      - name: PCS runbook smoke (shell)
        run: |
          cargo build -p certifyedge
          chmod +x scripts/pcs-runbook.sh
          ./scripts/pcs-runbook.sh

      - name: cargo test
        run: cargo test --workspace -- --nocapture

      - name: Checkout pcs-core
        uses: actions/checkout@v4
        with:
          repository: SentinelOps-CI/pcs-core
          path: pcs-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pcs-core CLI
        run: pip install -e pcs-core/python

      - name: Validate release-run fixtures (pcs-core)
        run: pcs validate tests/fixtures/release-run/trace_certificate.json

      - name: Validate PCS RC fixtures (pcs-core canonical)
        run: pcs validate tests/fixtures/labtrust-release/trace_certificate.json

      - name: Assert PCS RC fixtures match pcs-core (no drift)
        env:
          PCS_CORE_PATH: ${{ github.workspace }}/pcs-core
        run: bash ./scripts/check-pcs-core-rc-drift.sh

      - name: Assert PCS hash vectors match pcs-core (no drift)
        env:
          PCS_CORE_PATH: ${{ github.workspace }}/pcs-core
        run: bash ./scripts/check-pcs-hash-vectors-drift.sh

      - name: Verify canonical PCS RC certificate (CLI gate)
        run: |
          cargo build -p certifyedge
          cargo run -p certifyedge -- verify-certificate \
            tests/fixtures/labtrust-release/trace_certificate.json \
            --trace tests/fixtures/labtrust-release/trace.json

      - name: Phase 2 handoff emit gate
        env:
          CERTIFYEDGE_SOURCE_COMMIT: cb6848001e2e60a484e04eba5ad6be3fe2e4eccc
        run: |
          test -f tests/fixtures/handoff/labtrust_to_certifyedge_handoff.json
          mkdir -p target/handoff-ci
          cp tests/fixtures/labtrust-release/trace.json target/handoff-ci/trace.json
          cp tests/fixtures/handoff/labtrust_to_certifyedge_handoff.json target/handoff-ci/labtrust_to_certifyedge_handoff.json
          cargo run -p certifyedge -- --release-mode emit-pcs-certificate \
            --handoff target/handoff-ci/labtrust_to_certifyedge_handoff.json \
            --out target/handoff-ci/trace_certificate.json \
            --handoff-out target/handoff-ci/certifyedge_to_labtrust_handoff.json \
            --formal-facts-out target/handoff-ci/certificate_formal_facts.json
          test -f target/handoff-ci/certificate_formal_facts.json
          python3 -c "import json; f=json.load(open('target/handoff-ci/certificate_formal_facts.json')); assert f['admissible_for_release'] is True; assert f['formal_predicate']=='CertificateMatchesRuntime'"
          cargo run -p certifyedge -- verify-certificate \
            target/handoff-ci/trace_certificate.json \
            --trace target/handoff-ci/trace.json
          pcs registry check-artifact target/handoff-ci/trace_certificate.json
          pcs validate target/handoff-ci/trace_certificate.json
          pcs validate target/handoff-ci/certifyedge_to_labtrust_handoff.json

      - name: Phase 2 rejected handoff gate
        run: |
          cargo test -p certifyedge-integration --test handoff_rejected -- --nocapture

      - name: Computation witness handoff gate
        env:
          CERTIFYEDGE_SOURCE_COMMIT: ${{ github.sha }}
        run: |
          cargo test -p certifyedge-integration \
            --test handoff_computation \
            --test computation_emit \
            -- --nocapture

      - name: Assert PCS registry contribution matches pcs-core (no drift)
        env:
          PCS_CORE_PATH: ${{ github.workspace }}/pcs-core
        run: bash ./scripts/check-pcs-registry-contribution-drift.sh

      - name: PCS integration tests with pcs-core path (drift + registry)
        env:
          PCS_CORE_PATH: ${{ github.workspace }}/pcs-core
        run: |
          cargo test -p certifyedge-integration \
            test_local_fixtures_match_pcs_core_rc_source \
            test_rc_certificate_passes_pcs_registry_check_when_cli_available \
            -- --nocapture

      - name: Checkout LabTrust-Gym
        uses: actions/checkout@v4
        with:
          repository: fraware/LabTrust-Gym
          path: LabTrust-Gym

      - name: Install LabTrust-Gym (PCS)
        run: pip install -e LabTrust-Gym

      - name: PCS clean-checkout through certified (LabTrust + CertifyEdge)
        env:
          LABTRUST_GYM_ROOT: ${{ github.workspace }}/LabTrust-Gym
          PCS_CHAIN_WORK: ${{ github.workspace }}/target/pcs-chain
        run: |
          chmod +x scripts/pcs-v01-clean-checkout.sh scripts/certifyedge.sh
          ./scripts/pcs-v01-clean-checkout.sh --through-certified

      - name: Emit TraceCertificate (release mode) and pcs validate
        env:
          PCS_RUNBOOK_RELEASE: "1"
        run: |
          cargo run -p certifyedge -- --release-mode emit-pcs-certificate \
            --spec templates/hospital_lab/qc_release.stl \
            --trace tests/labtrust/valid_trace.json \
            --out target/trace_certificate.json
          pcs validate target/trace_certificate.json
          pcs validate tests/labtrust/expected_valid_certificate.json
          chmod +x scripts/pcs-runbook.sh
          ./scripts/pcs-runbook.sh

  bazel:
    name: Bazel integration test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: bazelbuild/setup-bazelisk@v3

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'Cargo.lock', '.bazelversion') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: bazel build PCS graph
        run: |
          bazel build --config=ci \
            //cli:certifyedge \
            //services/labtrust-adapter:labtrust_adapter \
            //services/pcs-certificate:pcs_certificate

      - name: bazel test (PCS integration + pipeline)
        run: ./scripts/bazel-pcs-test.sh
